    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: '#F67280',
              background: 'var(--color-background)',
              surface: 'var(--color-surface)',
              'surface-tonal': 'var(--color-surface-tonal)',
              text: 'var(--color-text)',
              'text-secondary': 'var(--color-text-secondary)',
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            animation: {
              'fade-in': 'fade-in 0.3s ease-out both',
              'fade-in-down': 'fade-in-down 0.6s ease-out both',
              'fade-in-up': 'fade-in-up 0.5s ease-out 0.1s both',
              'flash-update': 'flash-update 0.7s ease-out both',
              'typing-dot': 'typing-dot 1.4s infinite both',
              'pulse-border': 'pulse-border 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'bounce-slow': 'bounce-slow 2s infinite',
              'toast-in': 'toast-in 0.5s ease-out both',
              'toast-out': 'toast-out 0.5s ease-in both',
            },
            keyframes: {
              'fade-in': {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              },
              'fade-in-down': {
                '0%': { opacity: '0', transform: 'translateY(-20px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              'fade-in-up': {
                '0%': { opacity: '0', transform: 'translateY(20px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              'flash-update': {
                '0%': { 'background-color': 'rgba(246, 114, 128, 0)' },
                '25%': { 'background-color': 'rgba(246, 114, 128, 0.2)' },
                '100%': { 'background-color': 'rgba(246, 114, 128, 0)' },
              },
              'typing-dot': {
                '0%, 80%, 100%': { transform: 'scale(0)' },
                '40%': { transform: 'scale(1.0)' },
              },
              'pulse-border': {
                '0%, 100%': { 'border-color': 'rgba(246, 114, 128, 0.4)' },
                '50%': { 'border-color': 'rgba(246, 114, 128, 1)' },
              },
              'bounce-slow': {
                '0%, 100%': { transform: 'translateY(-20%)', animationTimingFunction: 'cubic-bezier(0.8,0,1,1)' },
                '50%': { transform: 'translateY(0)', animationTimingFunction: 'cubic-bezier(0,0,0.2,1)' },
              },
              'toast-in': {
                '0%': { transform: 'translateY(20px) scale(0.9)', opacity: '0' },
                '100%': { transform: 'translateY(0) scale(1)', opacity: '1' },
              },
              'toast-out': {
                '0%': { transform: 'translateY(0) scale(1)', opacity: '1' },
                '100%': { transform: 'translateY(20px) scale(0.9)', opacity: '0' },
              },
            }
          },
        },
      }
    </script>
    <style type="text/tailwindcss">
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap');
      
      :root, .theme-light {
        --color-background: #EBEBEB;
        --color-surface: #FFFFFF;
        --color-surface-tonal: #F5F5F5;
        --color-text: #1F1F1F;
        --color-text-secondary: #555555;
      }
      .theme-dark {
        --color-background: #121212;
        --color-surface: #1F1F1F;
        --color-surface-tonal: #2C2C2C;
        --color-text: #E0E0E0;
        --color-text-secondary: #A0A0A0;
      }
      .theme-true-dark {
        --color-background: #000000;
        --color-surface: #1F1F1F;
        --color-surface-tonal: #2C2C2C;
        --color-text: #E0E0E0;
        --color-text-secondary: #A0A0A0;
      }

      body {
        @apply bg-background text-text antialiased;
        transition: background-color 0.5s ease, color 0.5s ease;
      }
      
      /* FIX: Override browser autocomplete styles */
      input:-webkit-autofill,
      input:-webkit-autofill:hover,
      input:-webkit-autofill:focus,
      input:-webkit-autofill:active {
          -webkit-text-fill-color: var(--color-text) !important;
          -webkit-box-shadow: 0 0 0 30px var(--color-surface-tonal) inset !important;
          box-shadow: 0 0 0 30px var(--color-surface-tonal) inset !important;
          caret-color: var(--color-text) !important;
      }

      /* View transition styles */
      ::view-transition-old(root),
      ::view-transition-new(root) {
        animation: none;
        mix-blend-mode: normal;
      }
      ::view-transition-old(root) {
        z-index: 1;
      }
      ::view-transition-new(root) {
        z-index: 999;
      }
      @keyframes fade-in {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      @keyframes fade-out {
        from { opacity: 1; }
        to { opacity: 0; }
      }
      ::view-transition-new(root) {
        animation: fade-in 300ms ease-in-out;
      }
      ::view-transition-old(root) {
        animation: fade-out 300ms ease-in-out;
      }
      
      /* Family Tree Styles */
      .family-tree ul {
        padding-top: 20px; position: relative;
        transition: all 0.5s;
      }

      .family-tree li {
        float: left; text-align: center;
        list-style-type: none;
        position: relative;
        padding: 20px 5px 0 5px;
        transition: all 0.5s;
      }

      .family-tree li::before, .family-tree li::after{
        content: '';
        position: absolute; top: 0; right: 50%;
        border-top: 2px solid var(--color-text-secondary);
        width: 50%; height: 20px;
      }
      .family-tree li::after{
        right: auto; left: 50%;
        border-left: 2px solid var(--color-text-secondary);
      }

      .family-tree li:only-child::after, .family-tree li:only-child::before {
        display: none;
      }

      .family-tree li:only-child{ padding-top: 0;}

      .family-tree li:first-child::before{
        border: 0 none;
      }
      .family-tree li:last-child::after{
        border: 0 none;
      }
      .family-tree li:last-child::before{
        border-right: 2px solid var(--color-text-secondary);
        border-radius: 0 5px 0 0;
      }
      .family-tree li:first-child::after{
        border-radius: 5px 0 0 0;
      }

      .family-tree ul ul::before{
        content: '';
        position: absolute; top: 0; left: 50%;
        border-left: 2px solid var(--color-text-secondary);
        width: 0; height: 20px;
      }
    </style>
